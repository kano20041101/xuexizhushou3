version: '3.8'

services:
  backend:
    build: .
    container_name: xuexizhushou_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./backend/uploads:/app/backend/uploads
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: xuexizhushou_db
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-llm_learning_assistant}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xuexizhushou_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: xuexizhushou_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  mysql_data:
